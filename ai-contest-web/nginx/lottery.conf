upstream lottery_backend {
    server 127.0.0.1:3000;
}

upstream ai_contest_backend {
    server 127.0.0.1:3001;
}

server {
    listen 80 default_server;
    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript; 

    # AI大赛网站 - API
    location /ai-contest/api {
        rewrite ^/ai-contest/api/(.*) /api/$1 break;
        proxy_pass http://ai_contest_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # AI大赛网站 - 上传文件
    location /ai-contest/uploads {
        rewrite ^/ai-contest/uploads/(.*) /uploads/$1 break;
        proxy_pass http://ai_contest_backend;
    }

    # AI大赛网站 - 静态资源
    location /ai-contest/assets/ {
        alias /var/www/ai-contest/frontend/assets/;
        expires 1y;
    }

    # AI大赛网站 - 海报图片
    location /ai-contest/poster.jpg {
        alias /var/www/ai-contest/frontend/poster.jpg;
        expires 1y;
    }

    location /ai-contest/poster.jpeg {
        alias /var/www/ai-contest/frontend/poster.jpeg;
        expires 1y;
    }

    # AI大赛网站 - 前端页面
    location /ai-contest {
        alias /var/www/ai-contest/frontend;
        index index.html;
        try_files $uri $uri/ /ai-contest/index.html;
    }

    # 抽奖系统
    location / {
        root /var/www/lottery/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # 抽奖系统 API
    location /api {
        proxy_pass http://lottery_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /prizes {
        proxy_pass http://lottery_backend;
    }
}
